# ChatALL API Gateway - Nginx Configuration
# Version: 1.0.0
# Date: 2024-01-15

# ------------------------------
# HTTP 服务器配置
# ------------------------------
http {
    # 基本配置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # MIME 类型
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time $upstream_response_time';

    log_format proxy_log '$remote_addr - $remote_user [$time_local] "$request" '
                         '$status $body_bytes_sent "$http_referer" '
                         '"$http_user_agent" "$http_origin" '
                         '$request_time $upstream_response_time $upstream_status';

    # 访问日志和错误日志
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 限流配置
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $http_origin zone=origin_limit:10m rate=1000r/m;

    # 连接限制
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # 上游服务器配置
    upstream openai_api {
        server api.openai.com:443;
        keepalive 64;
    }

    upstream anthropic_api {
        server api.anthropic.com:443;
        keepalive 64;
    }

    upstream google_api {
        server generativelanguage.googleapis.com:443;
        keepalive 64;
    }

    upstream groq_api {
        server api.groq.com:443;
        keepalive 64;
    }

    upstream cohere_api {
        server api.cohere.com:443;
        keepalive 64;
    }

    # 备用上游服务器（故障转移）
    upstream fallback_proxy {
        server backup-proxy.example.com:443 backup;
    }

    # ------------------------------
    # API 网关服务器
    # ------------------------------
    server {
        listen 80;
        server_name chatall-proxy.example.com;

        # HTTP 重定向到 HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name chatall-proxy.example.com;

        # SSL/TLS 配置
        ssl_certificate /etc/nginx/ssl/chatall-proxy.crt;
        ssl_certificate_key /etc/nginx/ssl/chatall-proxy.key;
        
        # TLS 1.2+ 强制
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
        
        # SSL 会话缓存
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头部
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 访问日志
        access_log /var/log/nginx/proxy-access.log proxy_log;

        # ------------------------------
        # CORS 预检请求处理
        # ------------------------------
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "$http_origin" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Custom-Header, X-API-Key" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "86400" always;
                return 204;
            }
        }

        # ------------------------------
        # OpenAI API 代理
        # ------------------------------
        location /api/v1/proxy/openai/ {
            # 限流
            limit_req zone=api_limit burst=10 nodelay;
            limit_conn conn_limit 10;

            # 请求验证
            if ($http_origin !~* ^https?://(chatall\.app|www\.chatall\.app|localhost(:[0-9]+)?)$) {
                return 403;
            }

            # 目标 URL 重写
            rewrite ^/api/v1/proxy/openai/(.*)$ /$1 break;

            # 代理配置
            proxy_pass https://openai_api;
            proxy_set_header Host api.openai.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Proxy-Source nginx;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Origin "";

            # CORS 响应头
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Credentials "true" always;

            # 超时配置
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲区配置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ------------------------------
        # Anthropic API 代理
        # ------------------------------
        location /api/v1/proxy/anthropic/ {
            limit_req zone=api_limit burst=10 nodelay;
            limit_conn conn_limit 10;

            if ($http_origin !~* ^https?://(chatall\.app|www\.chatall\.app|localhost(:[0-9]+)?)$) {
                return 403;
            }

            rewrite ^/api/v1/proxy/anthropic/(.*)$ /$1 break;
            proxy_pass https://anthropic_api;
            proxy_set_header Host api.anthropic.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Proxy-Source nginx;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Origin "";

            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Credentials "true" always;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ------------------------------
        # Google API 代理
        # ------------------------------
        location /api/v1/proxy/google/ {
            limit_req zone=api_limit burst=10 nodelay;
            limit_conn conn_limit 10;

            if ($http_origin !~* ^https?://(chatall\.app|www\.chatall\.app|localhost(:[0-9]+)?)$) {
                return 403;
            }

            rewrite ^/api/v1/proxy/google/(.*)$ /$1 break;
            proxy_pass https://google_api;
            proxy_set_header Host generativelanguage.googleapis.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Proxy-Source nginx;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Origin "";

            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Credentials "true" always;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ------------------------------
        # Groq API 代理
        # ------------------------------
        location /api/v1/proxy/groq/ {
            limit_req zone=api_limit burst=10 nodelay;
            limit_conn conn_limit 10;

            if ($http_origin !~* ^https?://(chatall\.app|www\.chatall\.app|localhost(:[0-9]+)?)$) {
                return 403;
            }

            rewrite ^/api/v1/proxy/groq/(.*)$ /$1 break;
            proxy_pass https://groq_api;
            proxy_set_header Host api.groq.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Proxy-Source nginx;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Origin "";

            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Credentials "true" always;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ------------------------------
        # 通用代理端点
        # ------------------------------
        location /api/v1/proxy/custom/ {
            limit_req zone=api_limit burst=5 nodelay;
            limit_conn conn_limit 5;

            if ($http_origin !~* ^https?://(chatall\.app|www\.chatall\.app|localhost(:[0-9]+)?)$) {
                return 403;
            }

            # 从请求中获取目标主机（通过自定义头部）
            proxy_pass https://$http_x_target_host;
            proxy_set_header Host $http_x_target_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Proxy-Source nginx;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Origin "";

            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Credentials "true" always;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ------------------------------
        # 健康检查端点
        # ------------------------------
        location /health {
            access_log off;
            return 200 '{"status": "healthy", "timestamp": "$time_local"}';
            add_header Content-Type application/json;
        }

        # ------------------------------
        # 状态监控端点
        # ------------------------------
        location /status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }

        # ------------------------------
        # 错误页面
        # ------------------------------
        error_page 403 /error/403.json;
        error_page 429 /error/429.json;
        error_page 500 502 503 504 /error/5xx.json;

        location /error/ {
            internal;
            root /var/www/chatall-proxy/errors;
            default_type application/json;
        }

        # ------------------------------
        # 禁止访问敏感路径
        # ------------------------------
        location ~ /\.(htaccess|htpasswd|svn|git) {
            deny all;
            return 403;
        }
    }

    # ------------------------------
    # 管理界面服务器（可选）
    # ------------------------------
    server {
        listen 8443 ssl;
        server_name chatall-proxy-admin.example.com;

        ssl_certificate /etc/nginx/ssl/chatall-proxy.crt;
        ssl_certificate_key /etc/nginx/ssl/chatall-proxy.key;

        # 限制访问
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        # 管理界面位置
        location / {
            root /var/www/chatall-proxy/admin;
            index index.html;
        }
    }
}

# ------------------------------
# 主配置
# ------------------------------
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

daemon on;
pid /run/nginx.pid;
worker_processes auto;
worker_rlimit_nofile 10000;